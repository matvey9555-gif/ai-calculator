<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Калькулятор Ai Услуг</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
:root {
    --bg: #111111;
    --card: #1b1b1b;
    --text: #ffffff;
    --muted: #b5b5b5;
    --gold: #D4AF37;
    --border: #2d2d2d;
    --summary-bg: #222222;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
}

body {
    font-family: Inter, -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: 200px;
}

.container {
    max-width: 700px;
    margin: 0 auto;
    padding: 16px;
}

/* Вкладки */
.tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
}

.tab {
    flex: 1;
    border: none;
    background: var(--card);
    color: var(--muted);
    padding: 14px 10px;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: .25s;
}

.tab.active {
    background: var(--gold);
    color: #111;
}

.panel {
    display: none;
}

.panel.active {
    display: block;
}

/* Карточки и элементы */
.card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 14px;
}

.checkbox-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    padding: 10px 0;
}

.checkbox-row label {
    flex: 1;
    font-size: 15px;
    line-height: 1.4;
}

.price-tag {
    color: var(--gold);
    font-size: 13px;
    margin-top: 4px;
    display: block;
}

input[type="checkbox"] {
    width: 22px;
    height: 22px;
    accent-color: var(--gold);
    cursor: pointer;
}

.slider-block {
    margin: 18px 0;
}

.slider-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
}

.slider-label {
    font-size: 15px;
}

.slider-value {
    color: var(--gold);
    font-weight: 700;
    font-size: 16px;
}

input[type="range"] {
    width: 100%;
    appearance: none;
    height: 6px;
    background: #333;
    border-radius: 999px;
    outline: none;
}

input[type="range"]::-webkit-slider-thumb {
    appearance: none;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: var(--gold);
    cursor: pointer;
    border: none;
}

input[type="range"]::-moz-range-thumb {
    width: 22px;
    height: 22px;
    border: none;
    border-radius: 50%;
    background: var(--gold);
    cursor: pointer;
}

.price {
    color: var(--gold);
    font-size: 14px;
    margin-top: 8px;
    font-weight: 500;
}

.summary-box {
    background: var(--summary-bg);
    border-radius: 8px;
    padding: 12px 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 16px;
}

/* Поле для ТЗ */
textarea {
    width: 100%;
    background: #111;
    border: 1px solid var(--border);
    color: var(--text);
    padding: 14px;
    border-radius: 12px;
    font-size: 15px;
    font-family: inherit;
    min-height: 100px;
    resize: vertical;
    margin-top: 10px;
    outline: none;
}

textarea:focus {
    border-color: var(--gold);
}

/* Подвал */
.footer {
    position: fixed;
    left: 0;
    right: 0;
    bottom: 0;
    background: #171717;
    border-top: 1px solid var(--border);
    padding: 16px;
    padding-bottom: calc(16px + env(safe-area-inset-bottom));
    z-index: 999;
}

.footer-inner {
    max-width: 700px;
    margin: 0 auto;
}

.total {
    text-align: center;
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 14px;
}

.total span {
    color: var(--gold);
    font-size: 22px;
    font-weight: 700;
    display: block;
    margin-top: 4px;
}

.submit-btn {
    width: 100%;
    border: none;
    background: var(--gold);
    color: #111;
    font-size: 16px;
    font-weight: 700;
    padding: 16px;
    border-radius: 12px;
    cursor: pointer;
}

.submit-btn:active {
    transform: scale(.98);
}
</style>
</head>
<body>

<div class="container">

    <div class="tabs">
        <button class="tab active" data-tab="video">Видео</button>
        <button class="tab" data-tab="photo">АИ Фото</button>
    </div>

    <div class="panel active" id="video">

        <div class="card">
            <div class="checkbox-row">
                <label>
                    Разработка идеи и сценария
                    <span class="price-tag">+100 сом</span>
                </label>
                <input type="checkbox" id="video-script">
            </div>
            <div class="checkbox-row">
                <label>
                    Раскадровка (Storyboard)
                    <span class="price-tag">+100 сом</span>
                </label>
                <input type="checkbox" id="video-storyboard">
            </div>
        </div>

        <div class="card">
            <div class="slider-block">
                <div class="slider-header">
                    <div class="slider-label">Длительность ролика (сек)</div>
                    <div class="slider-value"><span id="video-duration-val">0</span> сек</div>
                </div>
                <input type="range" id="video-duration" min="0" max="120" step="5" value="0">
                <div class="price" style="color: var(--muted); font-size: 12px;">(Не влияет на стоимость напрямую)</div>
            </div>
        </div>

        <div class="card">
            <div class="slider-block">
                <div class="slider-header">
                    <div class="slider-label">
                        Разговорные сцены (кол-во)
                        <div style="font-size: 12px; color: var(--muted); margin-top: 2px;">до 10 сек</div>
                    </div>
                    <div class="slider-value" id="video-talk-val">0</div>
                </div>
                <input type="range" id="video-talk" min="0" max="50" step="1" value="0">
                <div class="price" id="video-talk-price">0 сом</div>
            </div>

            <div class="slider-block">
                <div class="slider-header">
                    <div class="slider-label">
                        VFX / сложные сцены (кол-во)
                        <div style="font-size: 12px; color: var(--muted); margin-top: 2px;">до 10 сек</div>
                    </div>
                    <div class="slider-value" id="video-vfx-val">0</div>
                </div>
                <input type="range" id="video-vfx" min="0" max="50" step="1" value="0">
                <div class="price" id="video-vfx-price">0 сом</div>
            </div>

            <div class="summary-box">
                <div style="font-size: 14px; color: var(--muted);">Общее количество кадров:</div>
                <div id="video-frames-val" style="font-size: 16px; font-weight: 700; color: #fff;">0</div>
            </div>
        </div>

        <div class="card">
            <div class="checkbox-row">
                <label>
                    Монтаж и сборка
                    <span class="price-tag">+200 сом</span>
                </label>
                <input type="checkbox" id="video-edit">
            </div>
            <div class="checkbox-row">
                <label>
                    Саунд-дизайн и звук
                    <span class="price-tag">+100 сом</span>
                </label>
                <input type="checkbox" id="video-sound">
            </div>
        </div>

    </div>

    <div class="panel" id="photo">
        <div class="card">
            <div class="checkbox-row">
                <label>
                    Разработка визуальной концепции
                    <span class="price-tag">+150 сом</span>
                </label>
                <input type="checkbox" id="photo-concept">
            </div>
        </div>
        <div class="card">
            <div class="slider-block">
                <div class="slider-header">
                    <div class="slider-label">Количество фото-кадров</div>
                    <div class="slider-value" id="photo-count-val">0</div>
                </div>
                <input type="range" id="photo-count" min="0" max="100" step="1" value="0">
                <div class="price" id="photo-count-price">0 сом</div>
            </div>
        </div>
        <div class="card">
            <div class="checkbox-row">
                <label>
                    Адаптация под соцсети и рекламу
                    <span class="price-tag">+100 сом</span>
                </label>
                <input type="checkbox" id="photo-social">
            </div>
        </div>
    </div>

    <div class="card" style="border-color: var(--gold);">
        <div class="checkbox-row">
            <label style="font-weight: 600;">
                Создать собственного персонажа
                <span class="price-tag" style="color: var(--text);">Разовая услуга: +500 сом</span>
            </label>
            <input type="checkbox" id="global-character">
        </div>
        <hr style="border: 0; border-top: 1px solid var(--border); margin: 10px 0;">
        <div class="checkbox-row">
            <label style="font-weight: 600; color: #ff5e5e;">
                Срочный заказ (менее 3 дней)
                <span class="price-tag" style="color: #ff5e5e;">+30% к итоговой стоимости</span>
            </label>
            <input type="checkbox" id="global-urgent">
        </div>
    </div>

    <div class="card">
        <label style="font-size: 15px; font-weight: 600;">Короткое описание идеи (ТЗ):</label>
        <textarea id="brief-text" placeholder="Опишите, что вы хотите получить в итоге..."></textarea>
    </div>

</div>

<div class="footer">
    <div class="footer-inner">
        <div class="total">
            Ориентировочная стоимость:
            <span id="total-price">0 сом</span>
        </div>
        <button class="submit-btn" id="submitBtn">
            Отправить заявку
        </button>
    </div>
</div>

<script>
const tg = window.Telegram?.WebApp;

if (tg) {
    tg.ready();
    tg.expand();
}

let currentTab = "video";

// Переключение вкладок
document.querySelectorAll(".tab").forEach(tab => {
    tab.addEventListener("click", () => {
        document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
        document.querySelectorAll(".panel").forEach(p => p.classList.remove("active"));
        
        tab.classList.add("active");
        currentTab = tab.dataset.tab;
        document.getElementById(currentTab).classList.add("active");
        
        calculate();
    });
});

// Функция для обновления ползунков
function updateSlider(id, valId, priceId, priceMultiplier) {
    const slider = document.getElementById(id);
    
    function render() {
        const val = Number(slider.value);
        if(valId) document.getElementById(valId).textContent = val;
        
        if(priceId && priceMultiplier > 0) {
            document.getElementById(priceId).textContent = (val * priceMultiplier) + " сом";
        }
        calculate();
    }
    
    slider.addEventListener("input", render);
    render();
}

// Инициализация ползунков
updateSlider("video-duration", "video-duration-val", null, 0); 
updateSlider("video-talk", "video-talk-val", "video-talk-price", 120); 
updateSlider("video-vfx", "video-vfx-val", "video-vfx-price", 100); 
updateSlider("photo-count", "photo-count-val", "photo-count-price", 30); 

// Слушатели для всех чекбоксов
document.querySelectorAll('input[type="checkbox"]').forEach(el => {
    el.addEventListener("change", calculate);
});

// Главная функция подсчета
function calculate() {
    let subtotal = 0;

    if (currentTab === "video") {
        if (document.getElementById("video-script").checked) subtotal += 100;
        if (document.getElementById("video-storyboard").checked) subtotal += 100;
        
        const talkQty = Number(document.getElementById("video-talk").value);
        const vfxQty = Number(document.getElementById("video-vfx").value);
        
        // Автоматическое обновление счетчика "Общее количество кадров"
        document.getElementById("video-frames-val").textContent = talkQty + vfxQty;

        subtotal += talkQty * 120;
        subtotal += vfxQty * 100;
        
        if (document.getElementById("video-edit").checked) subtotal += 200;
        if (document.getElementById("video-sound").checked) subtotal += 100;
    }

    if (currentTab === "photo") {
        if (document.getElementById("photo-concept").checked) subtotal += 150;
        subtotal += Number(document.getElementById("photo-count").value) * 30;
        if (document.getElementById("photo-social").checked) subtotal += 100;
    }

    // Глобальные надбавки
    if (document.getElementById("global-character").checked) {
        subtotal += 500;
    }

    if (document.getElementById("global-urgent").checked) {
        subtotal = Math.round(subtotal * 1.3);
    }

    // Вывод на экран
    document.getElementById("total-price").textContent = subtotal.toLocaleString('ru-RU') + " сом";
    return subtotal;
}

// Сборка данных для отправки в Telegram
document.getElementById("submitBtn").addEventListener("click", () => {
    const total = calculate();
    const data = {
        category: currentTab,
        total: total,
        customCharacter: document.getElementById("global-character").checked,
        isUrgent: document.getElementById("global-urgent").checked,
        brief: document.getElementById("brief-text").value,
        details: {}
    };

    if (currentTab === "video") {
        const talkQty = Number(document.getElementById("video-talk").value);
        const vfxQty = Number(document.getElementById("video-vfx").value);
        
        data.details = {
            script: document.getElementById("video-script").checked,
            storyboard: document.getElementById("video-storyboard").checked,
            totalFrames: talkQty + vfxQty,
            desiredDurationSec: Number(document.getElementById("video-duration").value),
            talkScenesQty: talkQty,
            vfxScenesQty: vfxQty,
            edit: document.getElementById("video-edit").checked,
            sound: document.getElementById("video-sound").checked
        };
    } else {
        data.details = {
            concept: document.getElementById("photo-concept").checked,
            photoCount: Number(document.getElementById("photo-count").value),
            social: document.getElementById("photo-social").checked
        };
    }

    if (tg) {
        tg.sendData(JSON.stringify(data));
        tg.close();
    } else {
        alert("Итоговая сумма: " + total + " сом\n\nСобранные данные (в консоли):");
        console.log("Payload:", data);
    }
});

calculate();
</script>

</body>
</html>
